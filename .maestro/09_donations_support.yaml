appId: com.budgetbuddy.app
name: "09 - Doações (PIX/BTC) e Suporte"
---
- launchApp:
    stopApp: false

- waitForAnimationToEnd

- runFlow:
    when:
      visible: "Desbloquear Cofre"
    commands:
      - tapOn:
          id: "vault-password-input"
      - inputText: "${VAULT_PASSWORD}"
      - tapOn: "Desbloquear"
      - extendedWaitUntil:
          visible: "Perfil"
          timeout: 15000

- tapOn: "Perfil"
- assertVisible: "Aparência"

# ── Suporte: abre modal, valida tipos fixos, fecha
- scrollUntilVisible:
    element:
      text: "Contato e suporte"
- tapOn: "Contato e suporte"

- extendedWaitUntil:
    visible: "Contato e suporte"
    timeout: 3000

- assertVisible: "Erro"
- assertVisible: "Sugestão"
- assertVisible: "Elogio"
- assertVisible: "Mensagem"
- assertVisible: "Enviar email"

# Seleciona "Sugestão" — confirma que o seletor responde
- tapOn: "Sugestão"
- waitForAnimationToEnd

# Fecha modal tocando no overlay (área transparente acima)
- tapOn:
    point: "50%,5%"
- waitForAnimationToEnd

# ── Apoiar: abre modal, valida tabs PIX/Bitcoin + copiar
- scrollUntilVisible:
    element:
      id: "donation-card"
- tapOn:
    id: "donation-card"

- extendedWaitUntil:
    visible: "Apoie o desenvolvedor"
    timeout: 3000

- assertVisible: "PIX"
- assertVisible: "Bitcoin"
- assertVisible: "Copiar chave PIX"

# Troca pra tab Bitcoin
- tapOn: "Bitcoin"
- waitForAnimationToEnd
- assertVisible: "Copiar endereço"

# Sem crashes
- assertNotVisible: "Couldn't find a navigation context"
- assertNotVisible: "Something went wrong"
